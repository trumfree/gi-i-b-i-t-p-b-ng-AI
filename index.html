<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Giải Bài Tập – Thông Minh</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      startup: { typeset: false } // Chỉ chạy khi nhận được kết quả trả về từ AI
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

  <div class="bg-layer" id="bgLayer"></div>

  <header>
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">EduSolve <em>AI</em></span>
    </div>
    <nav>
      <button class="btn-settings" id="btnSettings" title="Cài đặt API">⚙ Cài đặt</button>
    </nav>
  </header>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3>⚙ Cài đặt API</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <label for="apiKeyInput">Groq API Key</label>
        <input type="password" id="apiKeyInput" placeholder="gsk_..." />
        <button class="btn-save" id="btnSaveKey">Lưu cấu hình</button>
      </div>
    </div>
  </div>

  <main class="container">
    <section class="section">
      <h2 class="section-title">1. Chọn Khối Lớp</h2>
      <div class="grid grade-grid" id="gradeGrid">
        <button class="grade-btn" data-grade="6">Lớp 6</button>
        <button class="grade-btn" data-grade="7">Lớp 7</button>
        <button class="grade-btn" data-grade="8">Lớp 8</button>
        <button class="grade-btn" data-grade="9">Lớp 9</button>
        <button class="grade-btn" data-grade="10">Lớp 10</button>
        <button class="grade-btn" data-grade="11">Lớp 11</button>
        <button class="grade-btn" data-grade="12">Lớp 12</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">2. Chọn Môn Học</h2>
      <div class="grid subject-grid" id="subjectGrid">
        <button class="subject-btn active" data-subject="auto">✨ Tự động nhận diện</button>
        <button class="subject-btn" data-subject="Toán học">📐 Toán học</button>
        <button class="subject-btn" data-subject="Vật lý">🌌 Vật lý</button>
        <button class="subject-btn" data-subject="Hóa học">🧪 Hóa học</button>
        <button class="subject-btn" data-subject="Tiếng Anh">🇬🇧 Tiếng Anh</button>
        <button class="subject-btn" data-subject="Sinh học">🌱 Sinh học</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">3. Tải Ảnh Bài Tập</h2>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*" style="display: none;" />
        <div id="uploadInner">
          <span class="upload-icon">📸</span>
          <p>Kéo thả ảnh vào đây hoặc <span class="highlight-link" id="clickUpload">nhấp để chọn ảnh</span></p>
        </div>
        <div id="previewWrap" style="display: none;">
          <img id="previewImg" src="" alt="Preview" />
          <button class="btn-remove" id="btnRemove">✕ Xóa ảnh</button>
        </div>
      </div>
    </section>

    <button class="btn-solve" id="btnSolve" disabled>
      <span class="btn-solve-text">🚀 Giải bài tập ngay</span>
    </button>

    <div class="result-container" id="resultContainer" style="display:none">
      <div class="result-header">
        <div class="result-badge">✅ Đáp án</div>
        <button class="btn-copy" id="btnCopy">📋 Sao chép</button>
      </div>
      <div class="result-meta" id="resultMeta"></div>
      <div class="result-body" id="resultBody"></div>
      <button class="btn-new" id="btnNew">🔄 Giải bài khác</button>
    </div>

    <div class="loading-container" id="loadingContainer" style="display:none">
      <div class="loading-spinner"></div>
      <div class="loading-steps" id="loadingSteps">
        <div class="loading-step active" id="ls1">🔍 Đang đọc bài tập từ ảnh...</div>
        <div class="loading-step" id="ls2">🧠 AI đang phân tích...</div>
        <div class="loading-step" id="ls3">✍ Đang viết lời giải chi tiết...</div>
      </div>
    </div>

    <div class="error-container" id="errorContainer" style="display:none">
      <div class="error-icon">⚠️</div>
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn-retry" id="btnRetry">Thử lại</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 EduSolve AI. Thiết kế theo phong cách tối giản All-Black.</p>
  </footer>

</body>
</html>
